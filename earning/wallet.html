<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>EarnPro – Wallet</title>
<link rel="stylesheet" href="assets/css/style.css">
<style>
.wd-summary-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.wd-sum-box{background:var(--card);border:1px solid var(--br);border-radius:var(--r2);padding:12px;text-align:center}
.wd-sum-val{font-size:17px;font-weight:800;margin-bottom:3px}
.wd-sum-lbl{font-size:10px;color:var(--t3);font-weight:500}
.empty-wd{text-align:center;padding:32px 16px;background:var(--card);border:1px solid var(--br);border-radius:var(--r2)}
.empty-wd .ei{font-size:40px;margin-bottom:10px;opacity:.35}
.empty-wd p{font-size:13px;color:var(--t3)}
.wd-card{background:var(--card);border:1px solid var(--br);border-radius:var(--r2);padding:15px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;gap:10px;transition:border-color .2s}
.wd-card:hover{border-color:var(--brh)}
.wd-ico{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.wd-ico.bkash{background:rgba(229,0,79,.12)}
.wd-ico.nagad{background:rgba(16,185,129,.12)}
.wd-ico.rocket{background:rgba(59,130,246,.12)}
.wd-left{display:flex;align-items:center;gap:11px;flex:1;min-width:0}
.wd-method{font-size:13px;font-weight:700}
.wd-acc{font-size:11px;color:var(--t3);margin-top:2px;font-family:monospace}
.wd-date{font-size:10px;color:var(--t3);margin-top:2px}
.wd-right{text-align:right;flex-shrink:0}
.wd-amount{font-size:15px;font-weight:800}
.filter-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.ftab{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;background:var(--bg2);border:1px solid var(--br);color:var(--t2);transition:all .2s}
.ftab.active{background:rgba(124,58,237,.2);border-color:var(--brh);color:var(--pl)}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div style="font-size:18px;font-weight:800">🏦 Wallet</div>
    <div class="tb-bal">💰 <span id="tbBal">0.00</span> <small>BDT</small></div>
  </div>
</div>

<div class="pg fade-in" style="padding-top:14px">

  <!-- BALANCE CARD -->
  <div class="bal-card" style="margin-bottom:16px">
    <div class="bal-lbl">Available Balance</div>
    <div class="bal-amt"><span>৳</span><span id="balShow">0.00</span></div>
    <div class="bal-sub">Minimum withdrawal: ৳<span id="minWdShow">50</span></div>
  </div>

  <!-- WITHDRAW SUMMARY -->
  <div class="wd-summary-grid">
    <div class="wd-sum-box">
      <div class="wd-sum-val" id="sumTotal" style="color:var(--t1)">৳0</div>
      <div class="wd-sum-lbl">Total Requested</div>
    </div>
    <div class="wd-sum-box">
      <div class="wd-sum-val" id="sumApproved" style="color:var(--green)">৳0</div>
      <div class="wd-sum-lbl">Total Approved</div>
    </div>
    <div class="wd-sum-box">
      <div class="wd-sum-val" id="sumPending" style="color:var(--gold)">0</div>
      <div class="wd-sum-lbl">Pending</div>
    </div>
  </div>

  <!-- WITHDRAW FORM -->
  <div class="card" style="margin-bottom:16px">
    <div class="stitle" style="margin-bottom:16px">💸 Request Withdrawal</div>
    <div class="igroup">
      <label>Payment Method</label>
      <select class="ifield" id="wdMethod">
        <option value="">— Select Method —</option>
        <option value="bkash">📱 bKash</option>
        <option value="nagad">💚 Nagad</option>
        <option value="rocket">🚀 Rocket</option>
      </select>
    </div>
    <div class="igroup">
      <label>Account Number</label>
      <input type="tel" id="wdAcc" class="ifield" placeholder="01XXXXXXXXX" maxlength="15">
    </div>
    <div class="igroup">
      <label>Withdrawal Amount (BDT)</label>
      <input type="number" id="wdAmt" class="ifield" placeholder="Enter amount" min="1">
    </div>
    <button class="btn btn-p btn-full" id="wdBtn" style="padding:14px;font-size:15px;margin-top:4px">
      💸 Submit Request
    </button>
  </div>

  <!-- HISTORY -->
  <div class="stitle">📜 Withdrawal History</div>

  <!-- FILTER TABS -->
  <div class="filter-tabs">
    <div class="ftab active" id="ft-all" onclick="filterHistory('all')">📋 All</div>
    <div class="ftab" id="ft-pending" onclick="filterHistory('pending')">⏳ Pending</div>
    <div class="ftab" id="ft-approved" onclick="filterHistory('approved')">✅ Approved</div>
    <div class="ftab" id="ft-rejected" onclick="filterHistory('rejected')">❌ Rejected</div>
  </div>

  <div id="histList"></div>

</div>

<nav class="bnav">
  <a href="home.html" class="bn-item" data-p="home">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Home
  </a>
  <a href="earn.html" class="bn-item" data-p="earn">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>Earn
  </a>
  <a href="earn.html" class="bn-center">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 13H13v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
  </a>
  <a href="wallet.html" class="bn-item active" data-p="wallet">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 18v1a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h14a2 2 0 012 2v1h-9a2 2 0 00-2 2v8a2 2 0 002 2h9zm-9-2h10V8H12v8zm4-2.5a1.5 1.5 0 110-3 1.5 1.5 0 010 3z"/></svg>Wallet
  </a>
  <a href="profile.html" class="bn-item" data-p="profile">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>Profile
  </a>
</nav>

<script type="module">
import { auth, db } from './assets/firebase/firebase.js';
import {
  doc, getDoc, getDocs, addDoc, collection,
  query, where, orderBy, updateDoc, increment, serverTimestamp
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { toast, showLoader, hideLoader, getSettings } from './assets/js/app.js';

let uid, balance = 0, minWd = 50;
let allHistory = [];
let currentFilter = 'all';

function ago(ts) {
  if (!ts) return '';
  const ms = Date.now() - (ts.seconds ? ts.seconds * 1000 : +ts);
  const m = Math.floor(ms / 60000);
  if (m < 1) return 'Just now';
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  const d = Math.floor(h / 24);
  if (d < 30) return d + 'd ago';
  const mo = Math.floor(d / 30);
  return mo + ' month' + (mo > 1 ? 's' : '') + ' ago';
}

function fmtDate(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts.seconds * 1000);
  return d.toLocaleDateString('en-BD', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
}

const _walletUnsub = onAuthStateChanged(auth, async user => {
  _walletUnsub();
  if (!user) { location.replace('login.html'); return; }
  uid = user.uid;

  const [usnap, cfg] = await Promise.all([
    getDoc(doc(db, 'users', uid)),
    getSettings(db)
  ]);
  const u = usnap.data();
  if (!u || u.isBanned) { location.replace('login.html'); return; }

  balance = parseFloat(u.balance || 0);
  minWd = cfg.minWithdraw || 50;
  document.getElementById('tbBal').textContent = balance.toFixed(2);
  document.getElementById('balShow').textContent = balance.toFixed(2);
  document.getElementById('minWdShow').textContent = minWd;

  await loadHistory();
});

async function loadHistory() {
  try {
    const snap = await getDocs(
      query(
        collection(db, 'withdraws'),
        where('uid', '==', uid),
        orderBy('createdAt', 'desc')
      )
    );

    allHistory = [];
    snap.forEach(d => allHistory.push({ id: d.id, ...d.data() }));
    updateSummary();
    renderHistory('all');
  } catch (e) {
    // If index not ready, fallback without orderBy
    try {
      const snap2 = await getDocs(
        query(collection(db, 'withdraws'), where('uid', '==', uid))
      );
      allHistory = [];
      snap2.forEach(d => allHistory.push({ id: d.id, ...d.data() }));
      allHistory.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
      updateSummary();
      renderHistory('all');
    } catch (e2) {
      console.error(e2);
    }
  }
}

function updateSummary() {
  const total = allHistory.reduce((s, w) => s + parseFloat(w.amount || 0), 0);
  const approved = allHistory.filter(w => w.status === 'approved').reduce((s, w) => s + parseFloat(w.amount || 0), 0);
  const pending = allHistory.filter(w => w.status === 'pending').length;

  document.getElementById('sumTotal').textContent = '৳' + total.toFixed(2);
  document.getElementById('sumApproved').textContent = '৳' + approved.toFixed(2);
  document.getElementById('sumPending').textContent = pending;
}

function renderHistory(filter) {
  currentFilter = filter;

  // Update tab styles
  ['all', 'pending', 'approved', 'rejected'].forEach(f => {
    const el = document.getElementById('ft-' + f);
    if (el) el.classList.toggle('active', f === filter);
  });

  const list = filter === 'all' ? allHistory : allHistory.filter(w => w.status === filter);
  const el = document.getElementById('histList');

  if (!list.length) {
    el.innerHTML = `<div class="empty-wd">
      <div class="ei">📜</div>
      <p>${filter === 'all' ? 'No withdrawals yet' : 'No ' + filter + ' withdrawals'}</p>
    </div>`;
    return;
  }

  const icons = { bkash: '📱', nagad: '💚', rocket: '🚀' };
  const colors = { bkash: 'bkash', nagad: 'nagad', rocket: 'rocket' };
  const smap = { pending: 's-p', approved: 's-a', rejected: 's-r' };
  const slabels = { pending: '⏳ Pending', approved: '✅ Approved', rejected: '❌ Rejected' };
  const amtColor = { pending: 'var(--gold)', approved: 'var(--green)', rejected: 'var(--red)' };

  el.innerHTML = '';
  list.forEach(w => {
    const method = w.method || 'unknown';
    el.innerHTML += `<div class="wd-card">
      <div class="wd-left">
        <div class="wd-ico ${colors[method] || ''}">${icons[method] || '💸'}</div>
        <div>
          <div class="wd-method">${method.charAt(0).toUpperCase() + method.slice(1)}</div>
          <div class="wd-acc">${w.account || '–'}</div>
          <div class="wd-date">${fmtDate(w.createdAt)}</div>
        </div>
      </div>
      <div class="wd-right">
        <div class="wd-amount" style="color:${amtColor[w.status] || 'var(--t1)'}">
          ৳${parseFloat(w.amount || 0).toFixed(2)}
        </div>
        <div class="schip ${smap[w.status] || 's-p'}" style="margin-top:5px">
          ${slabels[w.status] || '⏳ Pending'}
        </div>
      </div>
    </div>`;
  });
}

window.filterHistory = filter => renderHistory(filter);

// ── SUBMIT WITHDRAWAL ─────────────────────────────
document.getElementById('wdBtn').addEventListener('click', async () => {
  const method = document.getElementById('wdMethod').value;
  const acc    = document.getElementById('wdAcc').value.trim();
  const amt    = parseFloat(document.getElementById('wdAmt').value);

  if (!method)              { toast('Select a payment method', 'warn'); return; }
  if (!acc || acc.length < 11) { toast('Enter valid 11-digit account number', 'err'); return; }
  if (!amt || isNaN(amt))   { toast('Enter a valid amount', 'err'); return; }
  if (amt < minWd)          { toast(`Minimum withdrawal is ৳${minWd}`, 'err'); return; }

  const fresh = (await getDoc(doc(db, 'users', uid))).data();
  if (amt > parseFloat(fresh.balance || 0)) { toast('Insufficient balance', 'err'); return; }

  showLoader('Submitting...');
  try {
    const wdRef = await addDoc(collection(db, 'withdraws'), {
      uid,
      username: fresh.username || '',
      method, account: acc, amount: amt,
      status: 'pending',
      createdAt: serverTimestamp()
    });

    await updateDoc(doc(db, 'users', uid), { balance: increment(-amt) });

    balance -= amt;
    document.getElementById('tbBal').textContent  = balance.toFixed(2);
    document.getElementById('balShow').textContent = balance.toFixed(2);
    document.getElementById('wdMethod').value = '';
    document.getElementById('wdAcc').value    = '';
    document.getElementById('wdAmt').value    = '';

    // Add to local list immediately
    allHistory.unshift({
      id: wdRef.id,
      uid, method, account: acc, amount: amt,
      status: 'pending',
      createdAt: { seconds: Math.floor(Date.now() / 1000) }
    });
    updateSummary();
    renderHistory(currentFilter);

    hideLoader();
    toast('Withdrawal request submitted! ✅', 'ok');
  } catch (e) {
    hideLoader();
    toast('Failed. Try again.', 'err');
  }
});
</script>
</body>
</html>
