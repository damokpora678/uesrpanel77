<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#07071a">
<title>EarnPro – Login</title>
<link rel="stylesheet" href="assets/css/style.css">
<style>body{padding:0;min-height:100svh;display:flex;flex-direction:column;justify-content:center}</style>
</head>
<body>
<div class="auth-pg fade-in" style="width:100%">
  <div class="auth-logo">
    <div class="al">💎</div>
    <h1>EarnPro</h1>
    <p>Your premium earning platform</p>
  </div>
  <div class="auth-card">
    <h2>Welcome Back 👋</h2>
    <p class="sub">Sign in to continue earning</p>
    <div class="igroup ifield-ico">
      <label>Email Address</label>
      <span class="ico">✉️</span>
      <input type="email" id="em" class="ifield" placeholder="you@gmail.com" autocomplete="email">
    </div>
    <div class="igroup">
      <label>Password</label>
      <div style="position:relative">
        <input type="password" id="pw" class="ifield" placeholder="••••••••" style="padding-right:46px" autocomplete="current-password">
        <button id="eyeBtn" type="button" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--t3);cursor:pointer;font-size:18px;padding:4px">👁</button>
      </div>
    </div>
    <div style="text-align:right;margin:-8px 0 16px">
      <a href="#" id="forgotBtn" class="lnk" style="font-size:12px">Forgot password?</a>
    </div>
    <button class="btn btn-p btn-full btn-lg" id="loginBtn">🚀 Login to EarnPro</button>
    <div class="divider"></div>
    <p class="auth-foot" style="margin:0">No account? <a href="register.html">Create one free</a></p>
  </div>
</div>

<script type="module">
/* ════════════════════════════════════════════════════════════
   EarnPro Login — signInWithEmailAndPassword ONLY
   ════════════════════════════════════════════════════════════ */
import { auth, db } from './assets/firebase/firebase.js';
import {
  signInWithEmailAndPassword,
  onAuthStateChanged,
  sendPasswordResetEmail
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { toast, showLoader, hideLoader } from './assets/js/app.js';

/* Single-fire: already logged in → home */
const unsub = onAuthStateChanged(auth, user => {
  unsub();
  if (user) location.replace('home.html');
});

document.getElementById('eyeBtn').addEventListener('click', function () {
  const p = document.getElementById('pw');
  p.type = p.type === 'password' ? 'text' : 'password';
  this.textContent = p.type === 'password' ? '👁' : '🙈';
});

document.getElementById('loginBtn').addEventListener('click', async () => {
  const em = document.getElementById('em').value.trim().toLowerCase();
  const pw = document.getElementById('pw').value;
  if (!em || !pw) { toast('Fill all fields', 'err'); return; }

  showLoader('Signing in...');
  try {
    /* signInWithEmailAndPassword — only Firebase Auth method */
    const cred = await signInWithEmailAndPassword(auth, em, pw);
    const uid  = cred.user.uid; /* Firebase Authentication UID */
    console.log('[EarnPro] Login Success. UID:', uid);

    /* Check ban status */
    try {
      const snap = await getDoc(doc(db, 'users', uid));
      if (snap.exists() && snap.data()?.isBanned) {
        const { signOut } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');
        await signOut(auth);
        hideLoader();
        toast('Account banned. Contact support.', 'err');
        return;
      }
    } catch { /* non-fatal */ }

    hideLoader();
    toast('Welcome back! 🎉', 'ok');
    setTimeout(() => location.replace('home.html'), 400);

  } catch (e) {
    hideLoader();
    console.error('[EarnPro] Login error:', e);
    const m = {
      'auth/user-not-found':        'No account with this email.',
      'auth/wrong-password':        'Wrong password. Try again.',
      'auth/invalid-email':         'Invalid email address.',
      'auth/invalid-credential':    'Invalid email or password.',
      'auth/too-many-requests':     'Too many attempts. Wait a moment.',
      'auth/network-request-failed':'Network error. Check connection.'
    };
    toast(m[e.code] || 'Login failed: ' + e.code, 'err');
  }
});

document.getElementById('forgotBtn').addEventListener('click', async e => {
  e.preventDefault();
  const em = document.getElementById('em').value.trim();
  if (!em) { toast('Enter email first', 'warn'); return; }
  try {
    await sendPasswordResetEmail(auth, em);
    toast('Reset email sent! Check inbox 📧', 'ok');
  } catch { toast('Could not send reset email.', 'err'); }
});
</script>
</body>
</html>
